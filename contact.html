<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EduMaster — Contact</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="container topbar">
      <div class="brand">
        <div class="logo">E</div>
        <div>
          <div>EduMaster Academy</div>
          <div style="font-size:12px;color:var(--muted);font-weight:600">Contatti</div>
        </div>
      </div>
      <nav>
        <a class="pill" href="index.html">Home</a>
        <a class="pill" href="courses.html">Courses</a>
        <a class="pill" href="teachers.html">Teachers</a>
        <a class="pill" href="pricing.html">Pricing</a>
        <a class="pill active" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <div class="sectionHead">
        <div>
          <h2>Contattaci</h2>
          <p>Modulo semplice (solo HTML). Puoi aggiungere il tuo email vero.</p>
        </div>
        <span class="badge">Pagina 5/5</span>
      </div>

      <div class="form">
        <div class="field">
          <label for="name">Nome</label>
          <input id="name" type="text" placeholder="Inserisci il tuo nome" />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="esempio@mail.com" />
        </div>

        <div class="field">
          <label for="msg">Messaggio</label>
          <textarea id="msg" placeholder="Scrivi qui..."></textarea>
        </div>

        <button class="btn primary" type="button">Invia (demo)</button>
        <p class="hint" style="margin-top:10px">
          Nota: questo è un progetto statico. Il bottone è “demo” (senza back-end).
        </p>
      </div>
    </section>
  </main>

  <footer>
    <div class="container footerRow">
      <div>© 2026 EduMaster Academy — Progetto scolastico</div>
      <div><b>by Rania</b></div>
    </div>
  </footer>
</body>
</html>
