<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marocco — Sito Ufficiale (Progetto)</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#111a2e;
      --muted:#9fb0d0;
      --text:#eaf0ff;
      --accent:#38bdf8;
      --accent2:#22c55e;
      --border:rgba(255,255,255,.10);
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 900px at 20% 10%, rgba(56,189,248,.25), transparent 60%),
                  radial-gradient(1000px 800px at 80% 20%, rgba(34,197,94,.18), transparent 55%),
                  linear-gradient(180deg, #070b14, var(--bg));
      color:var(--text);
      line-height:1.6;
    }
    a{color:inherit; text-decoration:none}
    img{max-width:100%; display:block}
    .container{width:min(1100px, 92%); margin:0 auto}

    /* Top bar */
    header{
      position:sticky; top:0; z-index:50;
      background: rgba(7,11,20,.65);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--border);
    }
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 0;
      gap:14px;
    }
    .brand{
      display:flex; align-items:center; gap:12px;
      font-weight:800;
      letter-spacing:.2px;
    }
    .logo{
      width:38px; height:38px; border-radius:12px;
      background: linear-gradient(135deg, rgba(56,189,248,.9), rgba(34,197,94,.9));
      box-shadow: var(--shadow);
      display:grid; place-items:center;
      font-weight:900; color:#07101f;
    }
    nav{
      display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end;
    }
    .pill{
      padding:8px 12px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius:999px;
      font-size:14px;
      color:var(--muted);
      transition:.2s;
    }
    .pill:hover{transform:translateY(-1px); border-color: rgba(56,189,248,.35); color:var(--text)}
    .pill.active{border-color: rgba(56,189,248,.55); color:var(--text)}

    /* Hero */
    .hero{
      padding:34px 0 10px;
    }
    .heroGrid{
      display:grid;
      grid-template-columns: 1.15fr .85fr;
      gap:18px;
      align-items:stretch;
    }
    @media (max-width:900px){
      .heroGrid{grid-template-columns:1fr}
      nav{justify-content:flex-start}
    }
    .heroCard{
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .heroMain{padding:22px}
    .kicker{
      display:inline-flex; align-items:center; gap:8px;
      color:var(--muted);
      font-size:14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      padding:7px 10px;
      border-radius:999px;
    }
    h1{margin:14px 0 10px; line-height:1.1; font-size:38px}
    .lead{color:var(--muted); margin:0 0 14px}
    .ctaRow{display:flex; gap:10px; flex-wrap:wrap; margin-top:16px}
    .btn{
      padding:10px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.06);
      color:var(--text);
      font-weight:600;
      cursor:pointer;
      transition:.2s;
    }
    .btn.primary{
      border-color: rgba(56,189,248,.55);
      background: linear-gradient(135deg, rgba(56,189,248,.35), rgba(34,197,94,.18));
    }
    .btn:hover{transform:translateY(-1px)}
    .heroMedia{
      height:100%;
      display:grid;
      grid-template-rows: 1fr auto;
    }
    .heroImg{
      min-height:220px;
      background:
        linear-gradient(180deg, rgba(7,11,20,.1), rgba(7,11,20,.65)),
